{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini App Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body { opacity: 0; transition: opacity 0.3s; }
    body.loaded { opacity: 1; }

    /* Обёртка */
    .miniapp-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px;
    }

    /* Заголовок */
    .miniapp-title {
      font-size: 1.4rem;
      margin-bottom: 16px;
      text-align: center;
    }

    /* Сетка карточек */
    .miniapp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    /* Карточка товара */
    .mini-card {
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* Изображение полностью по вертикали */
    .mini-card img {
      width: 100%;
      height: 180px;
      object-fit: contain; /* Показываем полностью без обрезки */
      background: #fff;
      border-radius: 8px;
    }

    /* Содержимое карточки */
    .mini-card-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .mini-card-title {
      font-size: 1rem;
      margin: 0;
    }

    .mini-card-desc {
      font-size: 0.9rem;
      line-height: 1.3;
      opacity: 0.85;
      margin: 0;
      min-height: 2.4em;
    }

    .mini-card-price {
      font-weight: 700;
      margin: 0;
      opacity: 0.9;
    }

    .mini-btn {
      border: none;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      background: var(--tg-theme-button-color, #2aabee);
      color: var(--tg-theme-button-text-color, #fff);
      font-weight: 600;
      width: 100%;
      margin-top: auto;
    }

    /* Корзина */
    .mini-cart {
      margin-top: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.2);
    }

    .mini-cart-line {
      font-size: 0.95rem;
      margin: 6px 0;
    }

    /* Скрываем fallback кнопку оформления, используем MainButton */
    #fallbackCheckout {
      display: none;
    }

    /* Адаптив для телефонов */
    @media (max-width: 480px) {
      .miniapp-wrap {
        padding: 8px;
      }

      .mini-card-body {
        padding: 8px;
      }

      .mini-card-title {
        font-size: 0.95rem;
      }

      .mini-card-desc {
        font-size: 0.85rem;
      }

      .mini-card-price {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <main class="miniapp-wrap">
    <h1 class="miniapp-title">🛒 Магазин</h1>

    <!-- Карточки товаров -->
    <section id="products" class="miniapp-grid"></section>

    <!-- Корзина -->
    <section class="mini-cart" id="cartSummary">
      <strong>Корзина:</strong>
      <div id="cartLines" class="mini-cart-line">Пока пусто</div>
      <!-- скрытая fallback кнопка -->
      <button id="fallbackCheckout" class="mini-btn" type="button">Оформить заказ</button>
    </section>
  </main>

  <script src="{% static 'shop/miniapp/app.js' %}?v=2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.body.classList.add('loaded');
    });
  </script>
</body>
</html>
