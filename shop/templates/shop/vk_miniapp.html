<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MyChemStore</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f0f0; }
        .products { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: white; border-radius: 12px; overflow: hidden; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 10px; }
        .price { font-weight: bold; color: #4CAF50; }
        .btn { background: #4C75A3; color: white; border: none; padding: 8px; width: 100%; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
<div class="products">
{% for product in products %}
<div class="card">
    {% if product.image %}
    <img src="https://res.cloudinary.com/{{ CLOUDINARY_CLOUD_NAME }}/image/upload/{{ product.image }}" alt="{{ product.title }}">
    {% endif %}
    <div class="card-body">
        <h4>{{ product.title }}</h4>
        <p class="price">{{ product.price }} ₽</p>
        <button class="btn" onclick="addToCart({{ product.id }})">В корзину</button>
    </div>
</div>
{% endfor %}
</div>
<script>
vkBridge.send('VKWebAppInit');
function addToCart(productId) {
    vkBridge.send('VKWebAppTapticNotificationOccurred', {'type': 'success'});
    alert('Товар добавлен в корзину!');
}
</script>
</body>
</html>
