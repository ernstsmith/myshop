{% load static %}
{% extends "shop/base.html" %}

{% block content %}
<h2>{{ product.title }}</h2>
{% if product.image %}
<img src="https://res.cloudinary.com/{{ CLOUDINARY_CLOUD_NAME }}/image/upload/{{ product.image }}" alt="{{ product.title }}">
{% endif %}
<p>{{ product.description }}</p>
<p>Цена: {{ product.price }} ₽</p>

<form method="post" action="{% url 'add_to_cart' product.id %}">
    {% csrf_token %}
    <button type="submit">Добавить в корзину</button>
</form>
{% endblock %}
