{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <h2 class="fw-bold text-center mb-4">Street Style</h2>

    <div class="row g-4">
        {% for product in products %}
        <div class="col-md-4">
            <div class="card h-100 shadow-sm product-card">
                <div class="image-container">
                    {% if product.image %}
                        <img src="https://res.cloudinary.com/{{ CLOUDINARY_CLOUD_NAME }}/image/upload/{{ product.image }}" class="card-img-top" alt="{{ product.title }}">
                    {% else %}
                        <img src="{% static 'images/test-img.jpg' %}" class="card-img-top" alt="{{ product.title }}">
                    {% endif %}
                </div>

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ product.title }}</h5>
                    <p class="card-text">{{ product.description|truncatewords:20 }}</p>
                </div>

                <div class="card-footer d-flex justify-content-between align-items-center">
                    <strong class="price mb-0">{{ product.price }} ₽</strong>
                    <a href="{% url 'product_detail' product.id %}" class="btn btn-outline-neon btn-sm">Подробнее</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
