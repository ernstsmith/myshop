{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Graffiti Shop{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">

    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Стили проекта -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<!-- ====================== HEADER ====================== -->
<!-- ====================== HEADER ====================== -->
<header class="hero-header">
    <nav class="navbar navbar-expand-lg navbar-dark neon-navbar fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-glow" href="{% url 'home' %}">🖌 Graffiti Shop</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav"
                    aria-expanded="false" aria-label="Меню">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
    <li class="nav-item">
        <a class="nav-link text-glow" href="{% url 'home' %}">Главная</a>
    </li>
    <li class="nav-item">
        <a class="nav-link text-glow" href="#products-section">Продукты</a>
    </li>
    <li class="nav-item">
        <a class="nav-link text-glow" href="#gallery-section">Галерея</a>
    </li>
    <li class="nav-item">
        <a class="nav-link text-glow" href="{% url 'cart' %}">
            🛒 Корзина
        </a>
    </li>
</ul>
            </div>
        </div>
    </nav>
{% block hero_banner %}{% endblock %}
</header>



<!-- ====================== MAIN CONTENT ====================== -->
<main class="container my-4">
    {% block content %}{% endblock %}
</main>

<!-- ====================== FOOTER ====================== -->
<footer class="bg-dark text-white text-center py-3 mt-5">
    © 2025 Graffiti Shop
</footer>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>

</body>
</html>
